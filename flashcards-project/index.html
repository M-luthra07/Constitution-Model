<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards — Learn the Constitution | myConstitutionConnect</title>
    <meta name="description" content="Interactive flashcards to learn Fundamental Rights and Duties of the Indian Constitution." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Unified Page Header -->
    <header class="page-header">
        <div class="header-brand">
            <span class="brand-icon">⚖️</span>
            <div>
                <div class="brand-name">myConstitutionConnect</div>
                <div class="header-subtitle">Flashcard Learning Tool</div>
            </div>
        </div>
        <a href="/" class="header-back">← Back to Portal</a>
    </header>

    <!-- Two-Pane Shutter Layout -->
    <div class="main-container">
        <div class="shutter" id="rights-shutter">
            <h2>Fundamental Rights</h2>
            <div class="shutter-hint">Click to explore</div>
            <div class="flashcard-container" id="rights-flashcards"></div>
        </div>

        <div class="shutter" id="duties-shutter">
            <h2>Fundamental Duties</h2>
            <div class="shutter-hint">Click to explore</div>
            <div class="flashcard-container" id="duties-flashcards"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
