<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gazette of States — myConstitutionConnect</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --accent-saffron: #FF9933;
            --legal-green: #138808;
            --bg-dark: #0a0e1a;
            --card-glass: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 153, 51, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(19, 136, 8, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container { max-width: 1250px; margin: 0 auto; padding: 140px 20px 80px; }

        /* Hero Archival Pass */
        .archive-hero {
            text-align: center;
            margin-bottom: 80px;
            position: relative;
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fcf6ba 0%, #d4af37 40%, #fcf6ba 60%, #aa771c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero-tag {
            font-size: 0.9rem;
            color: var(--accent-saffron);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
            margin-bottom: 20px;
            display: block;
        }

        /* Search Section */
        .search-area {
            max-width: 800px;
            margin: 0 auto 100px;
        }

        .search-container {
            width: 100%;
            position: relative;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 8px;
            transition: 0.4s;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .search-container:focus-within {
            border-color: var(--primary-gold);
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .search-container input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 18px 40px;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
            text-align: center;
        }

        /* States Grid */
        .states-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .state-card {
            background: var(--card-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .state-card:hover {
            border-color: var(--primary-gold);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .state-name {
            font-family: 'Merriweather', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 5px;
        }

        .state-capital {
            font-size: 0.8rem;
            color: var(--accent-saffron);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 20px;
            display: block;
        }

        .flagship-act {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .act-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: block;
        }

        .act-name {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 600;
        }

        .btn-view-laws {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            transition: 0.3s;
        }

        .btn-view-laws:hover {
            background: var(--primary-gold);
            color: #000;
        }

        /* Portal Nav */
        .portal-nav {
            position: fixed;
            top: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-logo {
            text-decoration: none;
            font-family: 'Merriweather', serif;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
        }

        .logo-emblem { height: 32px; filter: drop-shadow(0 0 10px var(--primary-gold)); }

        .nav-actions { display: flex; gap: 15px; }

        .btn-pill {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 25px;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-pill:hover { border-color: var(--primary-gold); color: var(--primary-gold); }
        .btn-pill.active { background: var(--primary-gold); color: #000; }
    </style>
</head>
<body>

    <nav class="portal-nav">
        <a href="/" class="nav-logo">
            <img src="/static/logo.png" alt="Emblem" class="logo-emblem">
            <span>ScholarVault</span>
        </a>
        <div class="nav-actions">
            <a href="/dictionary" class="btn-pill">Dictionary</a>
            <a href="/" class="btn-pill active">Home Portal</a>
        </div>
    </nav>

    <div class="container">
        <header class="archive-hero">
            <span class="hero-tag">Legislative Repository</span>
            <h1>Gazette of States</h1>
            <p style="color: var(--text-muted); max-width: 800px; margin: 0 auto; font-size: 1.1rem;">
                Exploring the sovereign powers of states. Dive into local legislations, municipal laws, and territorial regulations from across the Union of India.
            </p>
        </header>

        <section class="search-area">
            <div class="search-container">
                <input type="text" id="stateSearch" placeholder="Find a territory or local act..." onkeyup="filterStates()">
            </div>
        </section>

        <div class="states-grid" id="statesGrid">
            <!-- States will be injected here -->
        </div>
    </div>

    <script>
        const states = [
            { name: "Maharashtra", capital: "Mumbai", act: "Maharashtra Regional and Town Planning Act, 1966", url: "https://maitri.mahaonline.gov.in/pdf/Maharashtra%20Regional%20and%20Town%20Planning%20Act,%201966.pdf" },
            { name: "Tamil Nadu", capital: "Chennai", act: "Tamil Nadu Panchayats Act, 1994", url: "https://www.tn.gov.in/acts-rules/rdpr" },
            { name: "Uttar Pradesh", capital: "Lucknow", act: "U.P. Zamindari Abolition and Land Reforms Act, 1950", url: "http://uphed.gov.in/Page/en/acts--rules" },
            { name: "Karnataka", capital: "Bengaluru", act: "Karnataka Land Reforms Act, 1961", url: "https://dpal.karnataka.gov.in/english" },
            { name: "West Bengal", capital: "Kolkata", act: "West Bengal Land Reforms Act, 1955", url: "https://wbdata.gov.in/" },
            { name: "Gujarat", capital: "Gandhinagar", act: "Gujarat Town Planning and Urban Development Act, 1976", url: "https://gujaratindia.gov.in/" },
            { name: "Kerala", capital: "Thiruvananthapuram", act: "Kerala Panchayati Raj Act, 1994", url: "https://kerala.gov.in/acts-rules" },
            { name: "Rajasthan", capital: "Jaipur", act: "Rajasthan Land Revenue Act, 1956", url: "https://rajasthan.gov.in/" },
            { name: "Punjab", capital: "Chandigarh", act: "Punjab Land Reforms Act, 1972", url: "http://punjab.gov.in/" },
            { name: "Delhi", capital: "New Delhi", act: "Delhi Police Act, 1978", url: "https://delhi.gov.in/" }
        ];

        function renderStates(filteredStates = states) {
            const grid = document.getElementById('statesGrid');
            grid.innerHTML = '';

            filteredStates.forEach(state => {
                const card = document.createElement('div');
                card.className = 'state-card';
                card.innerHTML = `
                    <div>
                        <span class="state-capital">${state.capital}</span>
                        <h3 class="state-name">${state.name}</h3>
                        <div class="flagship-act">
                            <span class="act-label">Flagship Legislation</span>
                            <p class="act-name">${state.act}</p>
                        </div>
                    </div>
                    <a href="${state.url}" class="btn-view-laws" target="_blank">Access State Portal</a>
                `;
                grid.appendChild(card);
            });
        }

        function filterStates() {
            const query = document.getElementById('stateSearch').value.toLowerCase();
            const filtered = states.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.act.toLowerCase().includes(query) ||
                s.capital.toLowerCase().includes(query)
            );
            renderStates(filtered);
        }

        renderStates();
    </script>
</body>
</html>
