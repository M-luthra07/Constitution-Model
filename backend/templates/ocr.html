<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Intelligence - myConstitutionConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: 262 83% 58%;
            --accent: 38 92% 50%;
            --secondary: 210 100% 50%;
            --background: 224 71% 2%;  /* Darker background for depth */
            --surface: 224 71% 4%;     /* Slightly lighter surface */
            --foreground: 0 0% 100%;   /* Pure White */
            --muted: 215 20% 85%;      /* Much lighter muted text */
            --border: 217 32% 17%;
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Aura Background */
        .aura-bg {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
        }
        .aura { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.2; }
        .a1 { width: 600px; height: 600px; background: hsl(var(--primary)); top: -200px; right: -100px; }
        .a2 { width: 500px; height: 500px; background: hsl(var(--secondary)); bottom: -100px; left: -100px; }

        header {
            padding: 20px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .back-link {
            color: hsl(var(--muted));
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .back-link:hover { color: white; }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        /* --- Left Side: Scanner --- */
        .scanner-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: var(--shadow-premium);
            position: relative;
        }

        .drop-zone {
            width: 100%;
            height: 400px;
            border: 2px dashed var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: hsl(var(--primary));
            background: rgba(var(--primary), 0.05);
            transform: scale(1.01);
        }

        .upload-icon { font-size: 3rem; margin-bottom: 20px; filter: grayscale(1) opacity(0.5); transition: 0.3s; }
        .drop-zone:hover .upload-icon { filter: grayscale(0) opacity(1); transform: scale(1.1); }

        .preview-wrap {
            position: absolute; inset: 0;
            display: none; background: var(--surface);
            z-index: 10;
        }
        .preview-img { width: 100%; height: 100%; object-fit: contain; padding: 20px; }

        /* Scanning Line Animation */
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to bottom, transparent, hsl(var(--primary)));
            box-shadow: 0 0 20px hsl(var(--primary));
            z-index: 20;
            display: none;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .controls {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .mode-btn {
            padding: 16px; border-radius: 16px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: hsl(var(--muted));
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .mode-btn.active {
            background: white; color: black; border-color: white;
        }

        .analyze-btn {
            width: 100%; margin-top: 20px;
            padding: 20px; border-radius: 18px;
            background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--secondary)));
            color: white; font-weight: 800; font-size: 1.1rem; border: none;
            cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 20px -5px hsl(var(--primary) / 0.5);
        }
        .analyze-btn:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 15px 30px -5px hsl(var(--primary) / 0.6); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Right Side: Intelligence --- */
        .intelligence-card {
            display: flex; flex-direction: column;
            gap: 20px;
        }
        .result-panel {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            min-height: 600px;
            max-height: 800px;
            overflow-y: auto;
            position: relative;
        }
        .result-panel::-webkit-scrollbar { width: 6px; }
        .result-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .result-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border);
        }
        .result-title { font-family: 'Outfit'; font-size: 1.5rem; font-weight: 800; color: white; }

        /* Content Styling */
        .content-wrap { color: hsl(var(--foreground)); line-height: 1.8; font-size: 1.1rem; }
        .content-wrap h1, .content-wrap h2, .content-wrap h3 { color: white; margin: 35px 0 15px; font-family: 'Outfit'; font-weight: 800; border-left: 4px solid hsl(var(--primary)); padding-left: 15px; }
        .content-wrap strong { color: hsl(var(--accent)); font-weight: 700; }
        .content-wrap ul { list-style: none; margin: 20px 0; }
        .content-wrap li { margin-bottom: 16px; display: flex; gap: 12px; color: hsl(var(--muted)); border-left: 2px solid var(--border); padding-left: 20px; }

        /* Loader */
        .loader-wrap {
            display: none; position: absolute; inset: 0;
            background: var(--surface); z-index: 50;
            flex-direction: column; align-items: center; justify-content: center;
            border-radius: 32px;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid var(--border);
            border-top-color: hsl(var(--primary)); border-radius: 50%;
            animation: rotate 1s linear infinite; margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="aura-bg">
        <div class="aura a1"></div>
        <div class="aura a2"></div>
    </div>

    <header>
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Portal Home
        </a>
        <div style="font-family: 'Outfit'; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.9rem;">Intelligence Engine 2.0</div>
    </header>

    <div class="container">
        <!-- Left: Scanner -->
        <div class="scanner-card">
            <div class="drop-zone" id="dropZone">
                <div class="upload-icon">💠</div>
                <h3 style="font-family:'Outfit'; margin-bottom:8px;">Deep Scan Document</h3>
                <p style="color:hsl(var(--muted)); font-size:0.9rem;">Drag PDF, JPG or PNG to analyze</p>
                <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none;">

                <div class="preview-wrap" id="previewWrap">
                    <img src="" class="preview-img" id="previewImg">
                    <div id="pdfLabel" style="display:none; color:white; font-size:1.5rem; font-weight:800; font-family:'Outfit'; text-align:center;">PDF ATTACHED</div>
                    <div class="scan-line" id="scanLine"></div>
                </div>
            </div>

            <div class="controls">
                <button class="mode-btn active" data-mode="explain" onclick="setMode('explain')">EXPLAIN</button>
                <button class="mode-btn" data-mode="fill" onclick="setMode('fill')">DRAFT REPLIES</button>
            </div>

            <button class="analyze-btn" id="analyzeBtn" onclick="analyzeDocument()" disabled>INITIALIZE ANALYSIS</button>
            <button id="resetBtn" style="margin-top:15px; width:100%; background:transparent; border:1px solid var(--border); color:hsl(var(--muted)); padding:12px; border-radius:12px; cursor:pointer; display:none;" onclick="resetScanner()">Reset Scanner</button>
        </div>

        <!-- Right: Intelligence -->
        <div class="intelligence-card">
            <div class="result-panel">
                <div class="loader-wrap" id="loader">
                    <div class="spinner"></div>
                    <p style="font-family:'Outfit'; font-weight:600; color:white;">Analyzing with Constitutional AI...</p>
                </div>

                <div class="result-header">
                    <h2 class="result-title">Digital Intelligence</h2>
                    <button onclick="copyResult()" style="background:var(--border); border:none; padding:8px 16px; border-radius:100px; color:white; font-size:0.8rem; font-weight:700; cursor:pointer;">COPY REPORT</button>
                </div>

                <div class="content-wrap" id="resultContent">
                    <div style="text-align:center; padding-top:100px;">
                        <span style="font-size:3rem; display:block; margin-bottom:20px; opacity:0.3;">🔭</span>
                        <p style="opacity:0.5;">Awaiting document input for intelligence extraction.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewWrap = document.getElementById('previewWrap');
        const previewImg = document.getElementById('previewImg');
        const pdfLabel = document.getElementById('pdfLabel');
        const scanLine = document.getElementById('scanLine');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultContent = document.getElementById('resultContent');
        const loader = document.getElementById('loader');

        let currentFile = null;
        let currentMode = 'explain';

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if(!file) return;
            currentFile = file;
            analyzeBtn.disabled = false;
            previewWrap.style.display = 'flex';
            resetBtn.style.display = 'block';

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    pdfLabel.style.display = 'none';
                };
                reader.readAsDataURL(file);
            } else {
                previewImg.style.display = 'none';
                pdfLabel.style.display = 'block';
            }
        }

        function resetScanner() {
            currentFile = null;
            fileInput.value = '';
            previewWrap.style.display = 'none';
            analyzeBtn.disabled = true;
            resetBtn.style.display = 'none';
            scanLine.style.display = 'none';
            resultContent.innerHTML = '<div style="text-align:center; padding-top:100px;"><span style="font-size:3rem; display:block; margin-bottom:20px; opacity:0.3;">🔭</span><p style="opacity:0.5;">Awaiting document input for intelligence extraction.</p></div>';
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
        }

        async function analyzeDocument() {
            if (!currentFile) return;

            // UI Feedback
            analyzeBtn.disabled = true;
            loader.style.display = 'flex';
            scanLine.style.display = 'block';

            const formData = new FormData();
            formData.append('file', currentFile);
            formData.append('mode', currentMode);

            try {
                const res = await fetch('/analyze-doc', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.error) {
                    resultContent.innerHTML = `<div style="color:#ff6b6b; background:rgba(255,0,0,0.1); padding:20px; border-radius:16px;">Error: ${data.error}</div>`;
                } else {
                    // Structure the markdown-like result nicely
                    resultContent.innerHTML = data.result
                        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/^\- (.*$)/gim, '<li><span>$1</span></li>');
                }
            } catch (err) {
                resultContent.innerHTML = `<div style="color:#ff6b6b;">Network Failure: AI could not reach the server.</div>`;
            } finally {
                loader.style.display = 'none';
                scanLine.style.opacity = '0.3'; // Keep line visible but faint to show "done"
                analyzeBtn.disabled = false;
            }
        }

        function copyResult() {
            navigator.clipboard.writeText(resultContent.innerText);
            alert('Intelligence report copied to clipboard.');
        }

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
    </script>
</body>

</html>
