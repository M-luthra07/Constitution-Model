<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preamble Explorer - Indian Constitution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --primary-dark: #060918;
            --secondary-dark: #0f172a;
            --accent-saffron: #FF9933;
            --legal-green: #138808;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --parchment: #FFFFFF;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 153, 51, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(19, 136, 8, 0.08) 0%, transparent 40%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 90px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .back-btn {
            text-decoration: none;
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255,255,255,0.05);
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        .back-btn:hover { 
            color: var(--accent-saffron); 
            background: rgba(255, 153, 51, 0.1);
            border-color: var(--accent-saffron);
            box-shadow: 0 0 20px rgba(255, 153, 51, 0.2);
        }

        .header-identity {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .national-emblem {
            height: 55px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: 1.8rem;
            background: linear-gradient(to bottom, #fcf6ba 0%, #d4af37 40%, #fcf6ba 60%, #aa771c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .main-layout {
            flex: 1;
            display: flex;
            width: 100%;
            height: calc(100vh - 90px);
        }

        /* Sidebar for Languages */
        .sidebar {
            width: 350px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-saffron);
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 153, 51, 0.2);
            padding-bottom: 10px;
        }

        .lang-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 18px 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lang-card:hover {
            background: rgba(255, 153, 51, 0.05);
            border-color: var(--accent-saffron);
            transform: translateX(10px);
        }

        .lang-card.active {
            background: linear-gradient(135deg, var(--accent-saffron), #FFB160);
            border-color: var(--accent-saffron);
            color: #000;
            box-shadow: 0 10px 30px rgba(255, 153, 51, 0.3);
            font-weight: 800;
        }

        .lang-name-en { font-size: 1rem; font-weight: 600; }
        .lang-name-native { font-size: 0.9rem; opacity: 0.8; font-weight: 500; }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.2) 0%, transparent 80%);
        }

        .preamble-display {
            background: linear-gradient(165deg, #fcfaf5, #f5ecd6);
            color: #1a1a1a;
            width: 100%;
            max-width: 900px;
            padding: 80px 100px;
            border-radius: 4px;
            box-shadow: 
                0 50px 100px rgba(0, 0, 0, 0.5),
                0 0 50px rgba(212, 175, 55, 0.1);
            position: relative;
            margin-bottom: 50px;
            border: 8px solid transparent;
            border-image: linear-gradient(135deg, #d4af37, #fcf6ba, #d4af37) 1;
            transition: var(--t-smooth);
        }

        .preamble-display::after {
            content: "";
            position: absolute;
            inset: 20px;
            border: 1px solid rgba(0,0,0,0.05);
            pointer-events: none;
        }

        .preamble-header {
            text-align: center;
            margin-bottom: 60px;
            font-family: 'Merriweather', serif;
            position: relative;
        }

        .listen-btn-main {
            position: absolute;
            top: 0;
            right: -20px;
            background: #8b1d1d;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(139, 29, 29, 0.3);
            z-index: 20;
        }

        .listen-btn-main:hover {
            transform: scale(1.1) rotate(5deg);
            background: #a12323;
        }

        .preamble-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #4a2a14;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .preamble-subtitle {
            font-size: 1.1rem;
            color: #8b4513;
            font-style: italic;
            font-weight: 600;
        }

        .preamble-body {
            font-family: 'Merriweather', serif;
            font-size: 1.4rem;
            line-height: 2;
            text-align: justify;
            position: relative;
            white-space: pre-line;
            color: #222;
        }

        .keyword {
            color: #8b1d1d;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(120deg, transparent 0%, transparent 40%, rgba(212, 175, 55, 0.1) 40%, rgba(212, 175, 55, 0.2) 100%);
            background-size: 200% 100%;
            border-bottom: 2px solid rgba(139, 29, 29, 0.2);
            padding: 0 4px;
            transition: all 0.3s;
        }

        .keyword:hover {
            background-position: -100% 0;
            color: #b91c1c;
            border-bottom-color: #b91c1c;
        }

        /* Explanation Panel */
        .explanation-panel {
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .explanation-panel.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .exp-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
        }

        .exp-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-gold);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
            font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .exp-title-en { font-size: 1.5rem; font-weight: 800; color: var(--primary-gold); }
        .exp-title-native { font-size: 1rem; color: var(--text-muted); margin-top: 5px; font-weight: 500; }

        .exp-content {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #cbd5e1;
            font-family: 'Merriweather', serif;
        }

        @media (max-width: 1100px) {
            .main-layout { flex-direction: column; height: auto; overflow: visible; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; white-space: nowrap; border-right: none; border-bottom: 1px solid var(--glass-border); }
            body { overflow: auto; }
            .lang-card { flex-shrink: 0; width: 220px; }
        }

        @media (max-width: 768px) {
            .preamble-display { padding: 40px 30px; }
            .preamble-title { font-size: 1.6rem; }
            .preamble-body { font-size: 1.15rem; }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="/" class="back-btn">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                EXIT EXPLORER
            </a>
            <div class="header-identity">
                <img src="/static/logo.png" alt="National Emblem" class="national-emblem">
                <h1>Multilingual Preamble Explorer</h1>
            </div>
        </div>
        <div class="header-right">
            <div style="font-size: 0.75rem; color: var(--accent-saffron); font-weight: 800; letter-spacing: 2px;">SCHEDULE VIII · 22 LANGUAGES</div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">Scheduled Languages</div>
            <!-- Language cards will be injected here -->
        </aside>

        <main class="content-area">
            <div class="preamble-display" id="preambleDisplay">
                <div class="preamble-header">
                    <button class="listen-btn-main" id="listenPreambleBtn" title="Listen to Preamble">
                        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                    </button>
                    <div class="preamble-title" id="displayTitle">The Preamble</div>
                    <div class="preamble-subtitle" id="displaySubtitle">of the Constitution of India</div>
                </div>
                <div class="preamble-body" id="preambleText">
                    Loading the sacred text...
                </div>
            </div>

            <div class="explanation-panel" id="explanationPanel">
                <div class="exp-header">
                    <div class="exp-icon">⚖️</div>
                    <div class="exp-title-wrap">
                        <div class="exp-title-en" id="expTitleEn">Justice</div>
                        <div class="exp-title-native" id="expTitleNative">न्याय</div>
                    </div>
                    <button class="listen-btn-main small" id="listenMeaningBtn" style="position: static; width:36px; height:36px;" title="Listen to Meaning">
                        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>
                <div class="exp-content" id="expContent">
                    Select a highlighted word to see its constitutional meaning.
                </div>
            </div>
        </main>
    </div>

    <script>
        let preambleData = null;
        let currentLanguage = 'English'; // English will be base, but we will default to Hindi if available first

        // Native script mapping for labels
        const nativeNames = {
            "Assamese": "অসমীয়া",
            "Bengali": "বাংলা",
            "Bodo": "बर'",
            "Dogri": "डोगरी",
            "Gujarati": "ગુજરાતી",
            "Hindi": "हिन्दी",
            "Kannada": "ಕನ್ನಡ",
            "Kashmiri": "कश्मीरी / كٲشُر",
            "Konkani": "कोंकणी",
            "Maithili": "मैथिली",
            "Malayalam": "മലയാളം",
            "Manipuri": "মৈতৈলোন",
            "Marathi": "मराठी",
            "Nepali": "नेपाली",
            "Odia": "ଓଡ଼ିଆ",
            "Punjabi": "ਪੰਜਾਬੀ",
            "Sanskrit": "संस्कृतम्",
            "Santali": "ᱥᱟᱱᱛᱟᱲᱤ",
            "Sindhi": "सिंधी / سنڌي",
            "Tamil": "தமிழ்",
            "Telugu": "తెలుగు",
            "Urdu": "اردو",
            "English": "English"
        };

        const importantWords = ["Justice", "Liberty", "Equality", "Fraternity", "Sovereign", "Socialist", "Secular", "Democratic", "Republic"];
        
        // Language tags for Speech Synthesis
        const langTags = {
            "Hindi": "hi-IN", "Bengali": "bn-IN", "Tamil": "ta-IN", "Telugu": "te-IN",
            "Marathi": "mr-IN", "Gujarati": "gu-IN", "Kannada": "kn-IN", "Malayalam": "ml-IN",
            "Odia": "or-IN", "Punjabi": "pa-IN", "Urdu": "ur-PK", "Assamese": "as-IN",
            "Sanskrit": "sa-IN", "Kashmiri": "ks-IN", "Nepali": "ne-NP", "Konkani": "kok-IN",
            "Maithili": "mai-IN", "Dogri": "doi-IN", "Manipuri": "mni-IN", "Bodo": "brx-IN",
            "Santali": "sat-IN", "Sindhi": "sd-IN"
        };

        let audio = new Audio();

        function speak(text, language, btnId) {
            const btn = document.getElementById(btnId);
            const originalIcon = btn.dataset.originalIcon || btn.innerHTML;
            const stopIcon = '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>';

            if (!audio.paused) {
                audio.pause();
                audio.src = '';
                
                const wasPlaying = btn.dataset.status === 'playing';
                document.querySelectorAll('.listen-btn-main').forEach(b => {
                    b.innerHTML = b.dataset.originalIcon || b.innerHTML;
                    b.dataset.status = 'idle';
                    b.classList.remove('pulse');
                });
                
                if (wasPlaying) return;
            }

            const url = `/tts?text=${encodeURIComponent(text)}&lang=${encodeURIComponent(language)}`;
            audio.src = url;
            
            audio.onplay = () => {
                btn.dataset.originalIcon = originalIcon;
                btn.innerHTML = stopIcon;
                btn.dataset.status = 'playing';
                btn.classList.add('pulse');
            };

            audio.onended = () => {
                btn.innerHTML = originalIcon;
                btn.dataset.status = 'idle';
                btn.classList.remove('pulse');
            };

            audio.onerror = () => {
                btn.innerHTML = originalIcon;
                btn.dataset.status = 'idle';
                btn.classList.remove('pulse');
                console.error("Audio error");
            };

            audio.play().catch(console.error);
        }

        async function init() {
            try {
                const response = await fetch('/static/preamble_data.json');
                preambleData = await response.json();
                
                const availableLangs = Object.keys(preambleData.languages);
                renderSidebar(availableLangs);
                
                selectLanguage(availableLangs[0]);
                
                // Set up TTS listeners
                document.getElementById('listenPreambleBtn').onclick = () => {
                   const text = preambleData.languages[currentLanguage].preamble;
                   speak(text, currentLanguage, 'listenPreambleBtn');
                };
                
                document.getElementById('listenMeaningBtn').onclick = () => {
                   const meaning = document.getElementById('expContent').textContent;
                   speak(meaning, currentLanguage, 'listenMeaningBtn');
                };

            } catch (err) {
                console.error("Failed to load data:", err);
                document.getElementById('preambleText').textContent = "Error loading preamble data.";
            }
        }

        function renderSidebar(langs) {
            const sidebar = document.getElementById('sidebar');
            const title = sidebar.querySelector('.sidebar-title');
            sidebar.innerHTML = '';
            sidebar.appendChild(title);

            langs.sort().forEach(lang => {
                const card = document.createElement('div');
                card.className = 'lang-card';
                card.dataset.lang = lang;
                card.innerHTML = `
                    <div class="lang-name-en">${lang}</div>
                    <div class="lang-name-native">${nativeNames[lang] || ''}</div>
                `;
                card.onclick = () => selectLanguage(lang);
                sidebar.appendChild(card);
            });
        }

        function selectLanguage(lang) {
            currentLanguage = lang;
            
            // Update UI
            document.querySelectorAll('.lang-card').forEach(c => {
                c.classList.toggle('active', c.dataset.lang === lang);
            });

            const data = preambleData.languages[lang];
            let text = data.preamble;
            
            // Highlight keywords in the text
            // We need to find the native translations and replace them
            const words = data.words;
            const sortedByLength = Object.keys(words).sort((a, b) => words[b].translation.length - words[a].translation.length);
            
            // Replace with placeholders to avoid nested replacements
            let highlightedText = text;
            const replacements = [];

            sortedByLength.forEach((engWord, index) => {
                const nativeWord = words[engWord].translation;
                const placeholder = `__KEYWORD_${index}__`;
                
                // Case insensitive replace
                const regex = new RegExp(nativeWord, 'g');
                if (highlightedText.includes(nativeWord)) {
                   highlightedText = highlightedText.replace(regex, placeholder);
                   replacements.push({ placeholder, engWord, nativeWord });
                }
            });

            // Put back the HTML
            replacements.forEach(rep => {
                const html = `<span class="keyword" data-word="${rep.engWord}" onclick="showExplanation('${rep.engWord}')">${rep.nativeWord}</span>`;
                highlightedText = highlightedText.replace(rep.placeholder, html);
            });

            document.getElementById('preambleText').innerHTML = highlightedText;
            
            // Clear explanation panel
            const panel = document.getElementById('explanationPanel');
            panel.classList.remove('active');
        }

        function showExplanation(engWord) {
            const data = preambleData.languages[currentLanguage].words[engWord];
            
            document.getElementById('expTitleEn').textContent = engWord;
            document.getElementById('expTitleNative').textContent = data.translation;
            document.getElementById('expContent').textContent = data.meaning;
            
            const panel = document.getElementById('explanationPanel');
            panel.classList.add('active');
            
            // Scroll to explanation on mobile
            if (window.innerWidth <= 768) {
                panel.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        }

        init();
    </script>
</body>

</html>
