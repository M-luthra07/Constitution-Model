    <style>
        :root {
            --primary-gold: #D4AF37;
            --accent-saffron: #FF9933;
            --legal-green: #138808;
            --bg-dark: #0a0e1a;
            --card-glass: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(255, 153, 51, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(19, 136, 8, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container { max-width: 1250px; margin: 0 auto; padding: 140px 20px 80px; }

        /* Hero */
        .dictionary-hero {
            text-align: center;
            margin-bottom: 80px;
        }

        .hero-tag {
            font-size: 0.9rem;
            color: var(--accent-saffron);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fcf6ba 0%, #d4af37 40%, #fcf6ba 60%, #aa771c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        /* Search Section */
        .search-area {
            max-width: 900px;
            margin: 0 auto 100px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .search-container {
            width: 100%;
            position: relative;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 8px;
            transition: 0.4s;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .search-container:focus-within {
            border-color: var(--primary-gold);
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .search-container input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 18px 40px;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
            text-align: center;
        }

        /* Lang Picker */
        .lexicon-picker {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .lang-btn {
            padding: 10px 25px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lang-btn.active {
            background: var(--primary-gold);
            color: #000;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* Lexicon Grid */
        .lexicon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
        }

        .term-card {
            background: var(--card-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
        }

        .term-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .term-card:hover {
            border-color: var(--primary-gold);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .term-header {
            margin-bottom: 25px;
            position: relative;
        }

        .card-term {
            font-family: 'Merriweather', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-gold);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .term-pron {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            display: block;
            margin-top: 5px;
            opacity: 1;
        }

        .meaning-block {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            min-height: 100px;
        }

        .meaning-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--accent-saffron);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        .meaning-text {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.6;
        }

        .usage-block {
            border-left: 3px solid var(--legal-green);
            padding-left: 20px;
            position: relative;
        }

        .usage-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--legal-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            display: block;
        }

        .usage-text {
            color: #94a3b8;
            font-size: 0.9rem;
            font-style: normal;
        }

        /* Portal Nav */
        .portal-nav {
            position: fixed;
            top: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-logo {
            text-decoration: none;
            font-family: 'Merriweather', serif;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
        }

        .logo-emblem { height: 32px; filter: drop-shadow(0 0 10px var(--primary-gold)); }

        .nav-actions { display: flex; gap: 15px; }

        .btn-pill {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 25px;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-pill:hover { border-color: var(--primary-gold); color: var(--primary-gold); }
        .btn-pill.active { background: var(--primary-gold); color: #000; }
    </style>
</head>
<body>

    <nav class="portal-nav">
        <a href="/" class="nav-logo">
            <img src="/static/logo.png" alt="Emblem" class="logo-emblem">
            <span>ScholarVault</span>
        </a>
        <div class="nav-actions">
            <a href="/bibliography" class="btn-pill">Case Stories</a>
            <a href="/" class="btn-pill active">Home Portal</a>
        </div>
    </nav>

    <div class="container">
        <header class="dictionary-hero">
            <span class="hero-tag">Multilingual Lexicon</span>
            <h1>Lexicon of Justice</h1>
            <p style="color: var(--text-muted); max-width: 700px; margin: 0 auto; font-size: 1.1rem;">
                Deciphering the language of the law through interactive definitions and practical examples in all scheduled languages.
            </p>
        </header>

        <section class="search-area">
            <div class="search-container">
                <input type="text" id="termSearch" placeholder="Search a secret legal language..." onkeyup="filterTerms()">
            </div>
            
            <div class="lexicon-picker" id="langPicker">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="hi">हिन्दी</button>
                <button class="lang-btn" data-lang="bn">বাংলা</button>
                <button class="lang-btn" data-lang="te">తెలుగు</button>
                <button class="lang-btn" data-lang="mr">मराठी</button>
            </div>
        </section>

        <div class="lexicon-grid" id="dictGrid">
            <!-- Loading Interface -->
            <div style="text-align:center; padding: 100px; color: var(--primary-gold); grid-column: 1/-1;">
                <span style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 800;">DECODING LEGAL TERMS...</span>
            </div>
        </div>
    </div>

    <script>
        let dictionaryData = [];
        let currentLang = 'en';

        async function loadLegalKnowledge() {
            try {
                const response = await fetch('/api/legal-knowledge');
                const data = await response.json();
                dictionaryData = data.dictionary;
                renderDictionary();
            } catch (error) {
                console.error("Lexicon Load Error:", error);
            }
        }

        function renderDictionary() {
            const grid = document.getElementById('dictGrid');
            const query = document.getElementById('termSearch').value.toLowerCase();
            
            grid.innerHTML = '';
            
            const filtered = dictionaryData.filter(item => 
                item.term.toLowerCase().includes(query) || 
                (item[currentLang] && item[currentLang].toLowerCase().includes(query))
            );

            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'term-card';
                card.innerHTML = `
                    <div class="term-header">
                        <h3 class="card-term">${item.term}</h3>
                        <span class="term-pron">Pronunciation: ${item.pron}</span>
                    </div>
                    <div class="meaning-block">
                        <span class="meaning-label">Meaning (${currentLang.toUpperCase()})</span>
                        <p class="meaning-text">${item[currentLang] || 'Translation coming soon...'}</p>
                    </div>
                    <div class="usage-block">
                        <span class="usage-label">Practical Usage</span>
                        <p class="usage-text">"${item.usage}"</p>
                    </div>
                `;
                grid.appendChild(card);
                
                // Add staggered animation
                setTimeout(() => card.classList.add('visible'), index * 50);
            });
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            renderDictionary();
        }

        function filterTerms() {
            renderDictionary();
        }

        document.getElementById('langPicker').addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON') {
                setLanguage(e.target.dataset.lang);
            }
        });

        loadLegalKnowledge();
    </script>
</body>
</html>
</body>
</html>
